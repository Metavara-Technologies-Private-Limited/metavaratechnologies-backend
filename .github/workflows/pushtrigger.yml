name: METAVARA Backend pushtrigger

on:
  push:
    branches:
      - main
      - devops-build

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build from backend folder
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/website-backend:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/website-backend:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |

            echo "Pull latest image"
            docker pull ${{ secrets.DOCKER_USERNAME }}/website-backend:latest

            echo "Stop old container"
            docker ps -aq --filter "name=website-backend" | xargs -r docker stop
            docker ps -aq --filter "name=website-backend" | xargs -r docker rm

            echo "Start new container"
            docker run -d \
              --restart always \
              --name website-backend \
              -p 8003:8000 \
              -v /var/www/backend/media:/app/media \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e DEBUG="False" \
              -e SECURE_SSL_REDIRECT="${{ secrets.SECURE_SSL_REDIRECT }}" \
              -e ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
              -e CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}" \
              -e CSRF_TRUSTED_ORIGINS="${{ secrets.CSRF_TRUSTED_ORIGINS }}" \
              ${{ secrets.DOCKER_USERNAME }}/website-backend:latest

            echo "Run migrations"
            docker exec website-backend python manage.py migrate || true
